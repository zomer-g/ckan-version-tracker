services:
  - type: web
    name: ckan-version-tracker
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build && cd ..
      PYTHONPATH=/opt/render/project/src alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATA_GOV_IL_URL
        value: "https://data.gov.il"
      - key: ODATA_URL
        value: "https://www.odata.org.il"
      - key: ODATA_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: WORKER_API_KEY
        sync: false
      # LLM keys for POST /api/cbs/ask (natural-language CBS search). Provider is
      # chosen by whichever is set: DeepSeek preferred, then Anthropic. Both
      # empty ⇒ the endpoint returns 503. Set the VALUE(s) in the dashboard.
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Shared M2M secret for the "חיפוש רוחבי" gateway to call /mcp without
      # OAuth. Set the VALUE in the Render dashboard (must match the gateway's
      # MCP_TOKEN_OVER). Empty ⇒ the service-token bypass is off. See app/mcp/auth.py.
      - key: MCP_SERVICE_TOKEN
        sync: false
# No databases section — using external Neon PostgreSQL (free tier)
